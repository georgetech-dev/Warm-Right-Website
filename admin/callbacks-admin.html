<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Callbacks | Warm Right Admin</title>
  <link rel="icon" href="../assets/images/favicon.png">
  <link rel="stylesheet" href="../assets/css/admin.css?v=20260702georgetech">
  <link rel="stylesheet" href="../assets/css/callbacks-admin.css?v=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>window.adminPageTitle = 'Callbacks';</script>
  <script src="../assets/js/admin-include.js?v=20260705callbacks"></script>
</head>
<body>
  <div id="admin-header-container"></div>
  <main class="callbacks-admin">
    <section class="callback-metrics" aria-label="Callback summary">
      <div><span>Awaiting callback</span><strong id="metric-pending">0</strong></div>
      <div><span>Received today</span><strong id="metric-today">0</strong></div>
      <div><span>Completed</span><strong id="metric-completed">0</strong></div>
    </section>

    <section class="callback-panel callback-settings">
      <div class="callback-heading"><div><h2>Email Settings</h2><p>Choose where callback notifications are sent and whether customers receive confirmation.</p></div></div>
      <div class="callback-settings-grid">
        <label>Send callback notifications to<input id="callback-team-email" type="email" placeholder="info@warmright.uk"></label>
        <label class="callback-check"><input id="callback-customer-confirmation" type="checkbox"> Email confirmation when the customer provides an address</label>
        <div class="callback-actions"><button id="save-callback-settings" class="callback-btn primary" type="button">Save Settings</button><button id="send-callback-emails" class="callback-btn secondary" type="button">Send Queued Emails</button></div>
      </div>
      <p id="callback-settings-status" class="callback-status" role="status"></p>
    </section>

    <section class="callback-panel">
      <div class="callback-heading">
        <div><h1>Callback Requests</h1><p>Completed requests are hidden by default.</p></div>
        <div class="callback-tools"><input id="callback-search" type="search" placeholder="Search name, phone or request"><label class="callback-check"><input id="show-completed" type="checkbox"> Show completed</label></div>
      </div>
      <p id="callback-list-status" class="callback-status" role="status"></p>
      <div class="callback-table-wrap"><table><thead><tr><th>Customer</th><th>Preferred time</th><th>Request</th><th>Received</th><th>Status</th><th></th></tr></thead><tbody id="callback-table-body"><tr><td colspan="6">Loading callbacks...</td></tr></tbody></table></div>
    </section>
  </main>

  <div id="callback-modal" class="callback-modal" role="dialog" aria-modal="true" aria-labelledby="callback-modal-title" hidden>
    <section class="callback-modal-card">
      <button id="close-callback-modal" class="callback-modal-close" type="button" aria-label="Close">&times;</button>
      <h2 id="callback-modal-title">Callback Request</h2>
      <div id="callback-details" class="callback-detail-grid"></div>
      <label class="callback-comments">Internal comments<textarea id="callback-comments" rows="5" placeholder="Add call attempts, outcomes or anything the team needs to know..."></textarea></label>
      <div class="callback-modal-actions"><button id="save-callback-comments" class="callback-btn secondary" type="button">Save Comments</button><button id="complete-callback" class="callback-btn primary" type="button">Complete Callback</button></div>
      <p id="callback-modal-status" class="callback-status" role="status"></p>
    </section>
  </div>

  <script src="../assets/js/callbacks-admin.js?v=1"></script>
</body>
</html>

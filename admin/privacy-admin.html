<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Privacy Policy | Warm Right Admin</title>
  <link rel="icon" href="../assets/images/favicon.png">
  <link rel="stylesheet" href="../assets/css/admin.css?v=20260702georgetech">
  <link rel="stylesheet" href="../assets/css/privacy-admin.css?v=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>window.adminPageTitle = 'Privacy Policy';</script>
  <script src="../assets/js/admin-include.js?v=20260705theme"></script>
</head>
<body style="visibility:hidden">
  <div id="admin-header-container"></div>

  <main class="privacy-admin">
    <div id="privacy-list-view">
      <section class="privacy-admin-panel">
        <div class="privacy-admin-heading">
          <div>
            <h1>Privacy Policy</h1>
            <p>Manage the document title, review date and numbered policy sections.</p>
          </div>
          <a href="../privacy.html" target="_blank" rel="noopener" class="admin-button secondary">View Public Page</a>
        </div>
        <div class="privacy-settings-grid">
          <label>Page title
            <input id="privacy-page-title" value="Privacy Policy and Customer Privacy Notice">
          </label>
          <label>Review date
            <input id="privacy-review-date" type="date" value="2026-07-05">
          </label>
        </div>
        <div class="privacy-admin-actions" style="margin-top:16px;justify-content:flex-start">
          <button id="save-privacy-settings" class="primary" type="button">Save Document Settings</button>
          <button id="export-privacy-json" type="button">Export JSON</button>
          <button id="import-privacy-json" type="button">Import JSON</button>
          <input id="privacy-json-file" type="file" accept="application/json,.json" hidden>
        </div>
      </section>

      <section class="privacy-admin-panel">
        <div class="privacy-admin-toolbar">
          <h2>Policy Sections</h2>
          <div class="privacy-admin-actions">
            <button id="replace-privacy-draft" type="button">Restore Attached Draft</button>
            <button id="add-privacy-section" class="primary" type="button">Add Section</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr><th>No.</th><th>Subtitle</th><th>Status</th><th style="text-align:right">Actions</th></tr>
            </thead>
            <tbody id="privacy-sections-body">
              <tr><td colspan="4">Loading sections...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <section id="privacy-editor-view" class="privacy-admin-panel privacy-view-hidden">
      <div class="privacy-admin-toolbar">
        <h2 id="privacy-editor-title">Add Privacy Section</h2>
        <button id="close-privacy-editor" type="button">Back to Sections</button>
      </div>

      <label style="margin-top:18px">Section subtitle
        <input id="privacy-section-subtitle" maxlength="180" placeholder="For example: Who we are">
      </label>

      <label style="margin-top:18px">Section content</label>
      <div class="privacy-editor-shell">
        <div class="privacy-editor-toolbar" role="toolbar" aria-label="Privacy section formatting">
          <button type="button" data-privacy-command="bold" title="Bold"><strong>B</strong></button>
          <button type="button" data-privacy-command="italic" title="Italic"><em>I</em></button>
          <button type="button" data-privacy-command="underline" title="Underline"><u>U</u></button>
          <button type="button" data-privacy-command="insertUnorderedList">Bullets</button>
          <button type="button" data-privacy-command="insertOrderedList">Numbered List</button>
          <button type="button" id="privacy-add-link">Add Link</button>
          <button type="button" id="privacy-remove-link">Remove Link</button>
        </div>
        <div id="privacy-section-content" class="privacy-editor-body" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="Write this section of the privacy notice..."></div>
      </div>

      <div class="privacy-editor-options">
        <label><input id="privacy-section-active" type="checkbox" checked> Visible on the public privacy page</label>
      </div>

      <div class="privacy-admin-actions" style="justify-content:flex-start">
        <button id="save-privacy-section" class="primary" type="button">Save Section</button>
        <button id="delete-privacy-section" class="danger privacy-view-hidden" type="button">Delete Section</button>
        <button id="cancel-privacy-editor" type="button">Cancel</button>
      </div>
    </section>

    <p id="privacy-admin-status" class="privacy-admin-status" role="status"></p>
  </main>

  <script src="../assets/js/privacy-policy.js?v=2"></script>
  <script src="../assets/js/privacy-admin.js?v=2"></script>
</body>
</html>

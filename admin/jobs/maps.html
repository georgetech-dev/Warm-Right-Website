

  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UK Postcode Address Finder</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; font-size: 16px; }
    iframe { width: 100%; height: 450px; border: 0; margin-top: 20px; }
  </style>

</head>
<body>

  <h2>Find Address</h2>

  <input id="postcode" type="text" placeholder="Postcode (e.g. TN29 9XX)">
  <input id="house" type="text" placeholder="House number or name">

  <input id="full" type="text" placeholder="Start typing address…" style="display:none;">

  <iframe id="mapFrame"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const db = supabase.createClient(
      'https://axampuprcnauxbbijmmt.supabase.co',
      'sb_publishable_NFuFkO0tybTuMvYOQekQmA_62araOjM'
    );
    const postcode = document.getElementById('postcode');
    const house = document.getElementById('house');
    const full = document.getElementById('full');
    const map = document.getElementById('mapFrame');

    let lookupTimer;

    const postcodeRegex = /^[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}$/i;

    function updateFullField() {
      const pc = postcode.value.trim().toUpperCase();
      const hn = house.value.trim();

      if (postcodeRegex.test(pc) && hn.length >= 1) {
        full.style.display = "block";
        full.value = `${hn} ${pc}`;
        queueAddressLookup(full.value);
      }
    }

    function queueAddressLookup(value) {
      clearTimeout(lookupTimer);
      lookupTimer = setTimeout(() => lookupAddress(value), 350);
    }

    async function lookupAddress(value) {
      const query = String(value || '').trim();
      if (query.length < 3) return;

      const { data: predictionData, error: predictionError } = await db.functions.invoke('google-places', {
        body: { action: 'autocomplete', input: query },
      });
      if (predictionError || !predictionData?.predictions?.length) return;

      const { data: detailData, error: detailError } = await db.functions.invoke('google-places', {
        body: { action: 'details', place_id: predictionData.predictions[0].place_id },
      });
      if (detailError || !detailData?.place?.formatted_address) return;

      full.value = detailData.place.formatted_address;
      map.src = `https://www.google.com/maps?q=${encodeURIComponent(detailData.place.formatted_address)}&output=embed`;
    }

    postcode.addEventListener('input', updateFullField);
    house.addEventListener('input', updateFullField);
    full.addEventListener('input', () => queueAddressLookup(full.value));
  </script>

</body>
</html>

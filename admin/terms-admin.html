<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Terms & Conditions | Warm Right Admin</title>
  <link rel="icon" href="../assets/images/favicon.png">
  <link rel="stylesheet" href="../assets/css/admin.css?v=20260702georgetech">
  <link rel="stylesheet" href="../assets/css/privacy-admin.css?v=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>window.adminPageTitle = 'Terms & Conditions';</script>
  <script src="../assets/js/admin-include.js?v=20260705theme"></script>
</head>
<body style="visibility:hidden">
  <div id="admin-header-container"></div>

  <main class="privacy-admin">
    <div id="terms-list-view">
      <section class="privacy-admin-panel">
        <div class="privacy-admin-heading">
          <div>
            <h1>Terms &amp; Conditions</h1>
            <p>Manage one shared terms page, section anchors and review date for offers and other linked content.</p>
          </div>
          <a href="../terms.html" target="_blank" rel="noopener" class="admin-button secondary">View Public Page</a>
        </div>
        <div class="privacy-settings-grid">
          <label>Page title
            <input id="terms-page-title" value="Terms and Conditions">
          </label>
          <label>Review date
            <input id="terms-review-date" type="date" value="2026-07-13">
          </label>
        </div>
        <div class="privacy-admin-actions" style="margin-top:16px;justify-content:flex-start">
          <button id="save-terms-settings" class="primary" type="button">Save Document Settings</button>
          <button id="export-terms-json" type="button">Export JSON</button>
          <button id="import-terms-json" type="button">Import JSON</button>
          <input id="terms-json-file" type="file" accept="application/json,.json" hidden>
        </div>
      </section>

      <section class="privacy-admin-panel">
        <div class="privacy-admin-toolbar">
          <h2>Terms Sections</h2>
          <div class="privacy-admin-actions">
            <button id="replace-terms-draft" type="button">Restore Starter Draft</button>
            <button id="add-terms-section" class="primary" type="button">Add Section</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr><th>No.</th><th>Anchor</th><th>Subtitle</th><th>Status</th><th style="text-align:right">Actions</th></tr>
            </thead>
            <tbody id="terms-sections-body">
              <tr><td colspan="5">Loading sections...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <section id="terms-editor-view" class="privacy-admin-panel privacy-view-hidden">
      <div class="privacy-admin-toolbar">
        <h2 id="terms-editor-title">Add Terms Section</h2>
        <button id="close-terms-editor" type="button">Back to Sections</button>
      </div>

      <div class="privacy-settings-grid" style="margin-top:18px;">
        <label>Section subtitle
          <input id="terms-section-subtitle" maxlength="180" placeholder="For example: Family & Friends Offer">
        </label>
        <label>Anchor key
          <input id="terms-section-key" maxlength="80" placeholder="familyoffer">
        </label>
      </div>

      <label style="margin-top:18px">Section content</label>
      <div class="privacy-editor-shell">
        <div class="privacy-editor-toolbar" role="toolbar" aria-label="Terms section formatting">
          <button type="button" data-terms-command="bold" title="Bold"><strong>B</strong></button>
          <button type="button" data-terms-command="italic" title="Italic"><em>I</em></button>
          <button type="button" data-terms-command="underline" title="Underline"><u>U</u></button>
          <button type="button" data-terms-command="insertUnorderedList">Bullets</button>
          <button type="button" data-terms-command="insertOrderedList">Numbered List</button>
          <button type="button" id="terms-add-link">Add Link</button>
          <button type="button" id="terms-remove-link">Remove Link</button>
        </div>
        <div id="terms-section-content" class="privacy-editor-body" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="Write the terms for this section..."></div>
      </div>

      <div class="privacy-editor-options">
        <label><input id="terms-section-active" type="checkbox" checked> Visible on the public terms page</label>
      </div>

      <div class="privacy-admin-actions" style="justify-content:flex-start">
        <button id="save-terms-section" class="primary" type="button">Save Section</button>
        <button id="delete-terms-section" class="danger privacy-view-hidden" type="button">Delete Section</button>
        <button id="cancel-terms-editor" type="button">Cancel</button>
      </div>
    </section>

    <p id="terms-admin-status" class="privacy-admin-status" role="status"></p>
  </main>

  <script src="../assets/js/terms-policy.js?v=9"></script>
  <script src="../assets/js/terms-admin.js?v=1"></script>
</body>
</html>

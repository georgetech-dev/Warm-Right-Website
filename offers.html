<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Warm Right Ltd - Offers</title>
  <link rel="icon" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/mobile-nav.css">
  <link rel="stylesheet" href="assets/css/tiles.css">
  <link rel="stylesheet" href="assets/css/forms.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/hero.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    .offers-grid { display: grid; gap: 40px; margin-top: 30px; }
    .offers-grid .feature-tile {
      display: flex;
      min-height: 350px;
      overflow: hidden;
      border-radius: 20pt;
      background: var(--offers-card-background);
      color: var(--offers-card-text);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .offers-grid .feature-tile img {
      flex: 0 0 45%;
      width: 45%;
      max-width: 45%;
      min-height: 350px;
      align-self: stretch;
      object-fit: cover;
    }
    .offers-grid .tile-text {
      flex: 1 1 55%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    .offers-grid .tile-text h2 {
      font-size: 1.8rem;
      color: var(--offers-card-text);
      margin-bottom: 15px;
    }
    .offers-grid .tile-text p {
      color: var(--offers-card-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .offers-grid .offer-button-wrap {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid color-mix(in srgb, var(--offers-card-muted) 20%, transparent);
    }
    .btn-read-more {
      display: inline-block;
      margin-top: 0;
      padding: 12px 28px;
      background: var(--offers-button-background);
      color: var(--offers-button-text) !important;
      text-decoration: none !important;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-read-more:hover { background: var(--accent-orange); color: var(--offers-button-text) !important; transform: scale(1.03); }
    .offer-modal { display:none; position:fixed; inset:0; z-index:10000; align-items:center; justify-content:center; background:rgba(12,22,40,0.75); backdrop-filter:blur(6px); }
    .offer-modal-content { background:var(--offers-modal-background); color:var(--offers-modal-text); width:min(90vw, 650px); max-height:86vh; overflow:auto; border-radius:20px; padding:36px; position:relative; box-shadow:0 24px 70px rgba(0,0,0,0.35); }
    .offer-modal-close { position:absolute; top:18px; right:18px; width:36px; height:36px; border:0; border-radius:50%; cursor:pointer; font-size:1.2rem; background:var(--offers-modal-close-background); color:var(--offers-modal-close-text); }
    #offer-modal-body, #offer-modal-body p, #offer-modal-body li, #offer-modal-body span { color:var(--offers-modal-text); }
    .offer-actions { display:flex; gap:12px; margin-top:20px; }
    .offer-actions .btn-read-more { flex:1; text-align:center; }
    .offer-actions .is-hidden { display:none !important; }
    @media (max-width: 992px) {
      .offers-grid .feature-tile { flex-direction: column !important; max-width: 500px; margin: 0 auto; }
      .offers-grid .feature-tile img { width: 100%; max-width: 100%; min-height: 0; height: 220px; }
      .offers-grid .tile-text { padding: 30px; }
    }
    @media (max-width: 480px) {
      .offers-grid .tile-text h2 { font-size: 1.4rem; }
      .btn-read-more { width: 100%; text-align: center; }
      .offer-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header id="header"></header>

  <section class="hero managed-hero" data-managed-hero></section>

  <main class="container section">
    <section class="section-heading">
      <h2 class="section-heading card">Special Offers</h2>
      <p class="article-gap card">
        At Warm Right, we believe in rewarding loyalty, supporting landlords, and helping our community stay warm without breaking the bank. Take a look at our current offers below.
      </p>

      <div id="offers-container" class="offers-grid">
        <p class="loading-text">Loading current offers...</p>
      </div>
    </section>
  </main>

  <footer id="footer"></footer>

  <div id="offer-modal" class="offer-modal" onclick="if(event.target === this) closeOfferModal()">
    <div class="offer-modal-content">
      <button class="offer-modal-close" onclick="closeOfferModal()">&times;</button>
      <h2 id="offer-modal-title" style="margin-top:0; color:var(--offers-card-text);">Offer Details</h2>
      <div id="offer-modal-body" style="line-height:1.7;"></div>
      <div class="offer-actions">
        <button class="btn-read-more" onclick="closeOfferModal()">Close Window</button>
        <a id="offer-modal-terms" class="btn-read-more is-hidden" href="terms.html">Offer Terms</a>
        <a class="btn-read-more" href="book-a-visit.html">Book Now</a>
      </div>
    </div>
  </div>

  <script src="assets/js/public-image-resolver.js?v=1"></script>
  <script>
    const fallbackOffers = [
      {
        title: 'Family & Friends Offer',
        image_url: 'assets/images/family-offer.jpg',
        summary: 'Book together on the same day within a 2-mile radius and unlock generous boiler service discounts.',
        content_html: '<p>Know someone nearby who needs a boiler service or Gas Safety Check? Book together on the same day and save.</p><ul class="indent"><li>2 households: <strong>10% off</strong> each</li><li>3 households: <strong>30% off</strong> each</li><li>4 households: <strong>50% off</strong> each</li><li>5+ households: <strong>Yours is FREE!</strong></li></ul><p><em>Offer excludes parts. Boilers must have been serviced within the last 13 months. Terms apply.</em></p>',
        terms_section_key: 'family-offer',
        terms_link_label: 'Offer Terms'
      },
      {
        title: 'Landlord Bundle',
        image_url: 'assets/images/landlord-deal.jpg',
        summary: 'An all-in-one landlord package for compliance, servicing and tenant support.',
        content_html: '<p>Our landlord package includes what you need to stay compliant and keep tenants safe.</p><ul class="indent"><li>Unlimited same-day callouts to your property</li><li>Annual boiler service</li><li>CP12 Gas Safety Certificate</li><li>Free Energy Efficiency and System Condition Report</li></ul><p><strong>Only GBP 120 inc. VAT one-off</strong> or <strong>GBP 12/month inc. VAT</strong></p>',
        terms_section_key: 'landlord-bundle',
        terms_link_label: 'Bundle Terms'
      },
      {
        title: 'OAP Discounts',
        image_url: 'assets/images/oap-discount.jpg',
        summary: 'Discounted rates on selected services for older customers.',
        content_html: '<p>We are proud to support older customers with discounted rates on selected services. Let us know when booking and we will apply the saving automatically.</p>',
        terms_section_key: 'oap-discounts',
        terms_link_label: 'Discount Terms'
      },
      {
        title: 'Free Manuals & Guides',
        image_url: 'assets/images/manuals.jpg',
        summary: 'Free downloads, safety tips and troubleshooting information.',
        content_html: '<p>Need help identifying a fault or understanding your boiler? Visit our <a href="/support/manuals.html">Manuals & Information page</a> for free downloads, safety tips and troubleshooting advice.</p>',
        terms_section_key: 'general-offer-terms',
        terms_link_label: 'View Terms'
      }
    ];

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function imageMarkup(path, alt) {
      const fallbackPath = 'assets/images/no-image.jpg';
      const src = window.WarmRightImages?.imageUrl(path || fallbackPath) || (path || fallbackPath);
      const raw = window.WarmRightImages?.githubRawUrl(path || '') || '';
      return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" data-github-fallback="${escapeHtml(raw)}" onerror="if(this.dataset.githubFallback && this.dataset.githubFallback !== this.src){this.src=this.dataset.githubFallback;this.dataset.githubFallback='';}else{this.onerror=null;this.src='assets/images/no-image.jpg';}">`;
    }

    function renderOffers(offers) {
      window.currentOffers = offers;
      document.getElementById('offers-container').innerHTML = offers.map((offer, index) => `
        <div class="feature-tile ${index % 2 === 0 ? 'split-left' : 'split-right'} card visible">
          ${imageMarkup(offer.image_url, offer.title)}
          <div class="tile-text">
            <h2>${escapeHtml(offer.title)}</h2>
            <p>${escapeHtml(offer.summary)}</p>
            <div class="offer-button-wrap">
              <a class="btn-read-more" href="javascript:void(0)" onclick="openOfferModal(${index})">Read More</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    function termsHref(sectionKey) {
      const key = String(sectionKey || '').trim();
      return key ? `terms.html?section=${encodeURIComponent(key)}` : 'terms.html';
    }

    function rememberTermsTarget(sectionKey) {
      const key = String(sectionKey || '').trim();
      if (!key) return;
      try {
        sessionStorage.setItem('warmright_terms_target', key);
      } catch (_) {
        // ignore storage failures
      }
    }

    function openOfferModal(index) {
      const offer = window.currentOffers?.[index];
      if (!offer) return;
      showOfferModal(offer);
    }

    function showOfferModal(offer) {
      const html = offer.content_html || offer.summary || '';
      document.getElementById('offer-modal-title').textContent = offer.title || 'Offer Details';
      const safeHtml = window.WarmRightSanitize?.sanitizeRichHtml(html || '') || '';
      document.getElementById('offer-modal-body').innerHTML = safeHtml || 'More details will be available soon.';
      const termsButton = document.getElementById('offer-modal-terms');
      if (offer.terms_section_key) {
        termsButton.href = termsHref(offer.terms_section_key);
        termsButton.onclick = (event) => {
          event.preventDefault();
          rememberTermsTarget(offer.terms_section_key);
          window.location.href = termsHref(offer.terms_section_key);
        };
        termsButton.textContent = offer.terms_link_label || 'Offer Terms';
        termsButton.classList.remove('is-hidden');
      } else {
        termsButton.href = 'terms.html';
        termsButton.onclick = null;
        termsButton.textContent = 'Offer Terms';
        termsButton.classList.add('is-hidden');
      }
      document.getElementById('offer-modal').style.display = 'flex';
      window.WarmRightScrollLock?.lock('offers-modal') || document.body.classList.add('modal-open');
    }

    window.closeOfferModal = () => {
      document.getElementById('offer-modal').style.display = 'none';
      window.WarmRightScrollLock?.unlock('offers-modal') || document.body.classList.remove('modal-open');
    };

    let offersInitialised = false;

    function renderFallbackOffers() {
      renderOffers(fallbackOffers);
      if (typeof window.observeRevealCards === 'function') {
        window.observeRevealCards(document.getElementById('offers-container'));
      }
    }

    async function loadManagedOffers() {
      if (offersInitialised) return;
      offersInitialised = true;

      renderFallbackOffers();

      if (!window.db) {
        console.warn('Offers page: shared database client not ready, keeping fallback offers.');
        return;
      }

      const { data, error } = await window.db
        .from('site_offers')
        .select('*')
        .eq('is_active', true)
        .order('sort_order', { ascending: true });

      if (error) {
        console.warn('Offers page: managed offers could not be loaded.', error.message);
        return;
      }

      if (data && data.length) {
        renderOffers(data);
        if (typeof window.observeRevealCards === 'function') {
          window.observeRevealCards(document.getElementById('offers-container'));
        }
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderFallbackOffers, { once: true });
    } else {
      renderFallbackOffers();
    }

    document.addEventListener('includesLoaded', loadManagedOffers, { once: true });
  </script>
  <script src="assets/js/include.js"></script>
  <script src="assets/js/nav.js"></script>
<script src="assets/js/main.js?v=11"></script>
</body>
</html>
